<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e0a2e"/>
      <stop offset="100%" stop-color="#130a1e"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Calendar body -->
  <rect x="80" y="140" width="352" height="296" rx="22" fill="#1e0a2e" stroke="rgba(217,70,239,0.35)" stroke-width="5"/>

  <!-- Header bar -->
  <rect x="80" y="140" width="352" height="90" rx="22" fill="url(#header)"/>
  <rect x="80" y="206" width="352" height="24" fill="url(#header)"/>

  <!-- Binding rings -->
  <rect x="168" y="104" width="22" height="68" rx="11" fill="url(#ring)"/>
  <rect x="322" y="104" width="22" height="68" rx="11" fill="url(#ring)"/>

  <!-- Header text hint -->
  <rect x="140" y="168" width="130" height="14" rx="7" fill="rgba(255,255,255,0.45)"/>
  <circle cx="340" cy="175" r="9" fill="rgba(255,255,255,0.3)"/>
  <circle cx="368" cy="175" r="9" fill="rgba(255,255,255,0.3)"/>

  <!-- Grid row 1 -->
  <circle cx="136" cy="278" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="192" cy="278" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="248" cy="278" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="304" cy="278" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="360" cy="278" r="9" fill="rgba(192,132,252,0.5)"/>

  <!-- Grid row 2 — today highlight -->
  <circle cx="136" cy="328" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="192" cy="328" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="248" cy="328" r="16" fill="rgba(244,114,182,0.28)" stroke="#f472b6" stroke-width="3"/>
  <circle cx="248" cy="328" r="9"  fill="#f9a8d4"/>
  <circle cx="304" cy="328" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="360" cy="328" r="9" fill="rgba(192,132,252,0.5)"/>

  <!-- Grid row 3 -->
  <circle cx="136" cy="378" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="192" cy="378" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="248" cy="378" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="304" cy="378" r="9" fill="rgba(192,132,252,0.5)"/>
  <circle cx="360" cy="378" r="9" fill="rgba(192,132,252,0.18)"/>
</svg>
